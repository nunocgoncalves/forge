name: e2e-controlplane

on:
  pull_request:
    paths:
      - "test/e2e/**"
      - ".github/workflows/e2e-controlplane.yml"
  schedule:
    # Nightly 04:00 UTC — exercises the latest control-plane chart release so
    # regressions surface within a day. The PR-time run only triggers on
    # test/e2e/** changes, so without this a new chart release could go
    # unverified until forge itself changes. Staggered off the GPU nightly
    # (03:00 UTC) so the two independent e2e bursts don't coincide.
    - cron: "0 4 * * *"
  workflow_dispatch:

# Independent from the DigitalOcean e2e (no token, no global serialization).
concurrency:
  group: e2e-controlplane-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  controlplane-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      # Toolchain for the Kind-based chart-wiring harness. /usr/local/bin needs
      # sudo on the runner, so download to /tmp and `sudo install`.
      - name: install kind + helm + kubectl
        run: |
          curl -sSL -o /tmp/kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          curl -sSL https://get.helm.sh/helm-v3.18.0-linux-amd64.tar.gz | tar -xz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          curl -sSL -o /tmp/kubectl "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl

      # The control-plane chart (HOR-316) is published at
      # oci://ghcr.io/nunocgoncalves/iterabase-charts/control-plane. The test
      # auto-resolves the latest stable chart version + derives the image tag
      # from the chart's appVersion (HOR-321), then installs it into a Kind
      # cluster and exercises the identity flow.
      - name: control-plane identity e2e
        run: make test-e2e-controlplane
        env:
          # Authenticates the GitHub releases API call that auto-resolves the
          # chart version (raises the rate limit from 60 to 5000 req/hour).
          # Reads of the public charts repo work unauthenticated, but this
          # avoids CI rate-limit flakes.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
