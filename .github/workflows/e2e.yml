name: e2e

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "test/e2e/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

# Serialize e2e globally (one droplet at a time); never cancel a running e2e so
# its droplet is always torn down rather than orphaned.
concurrency:
  group: e2e
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: e2e
        run: make test-e2e
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
