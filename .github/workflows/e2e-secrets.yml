name: e2e-secrets

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "test/e2e/**"
      - ".github/workflows/e2e-secrets.yml"
  workflow_dispatch:

# Serialize with the other DO e2e (one droplet at a time); never cancel a running
# run so its droplet is always torn down rather than orphaned.
concurrency:
  group: e2e-secrets
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  secrets-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: secret-sync e2e
        run: make test-e2e-secrets
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
