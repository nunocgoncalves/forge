name: e2e-inference-gpu

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "test/e2e/**"
      - ".github/workflows/e2e-inference-gpu.yml"
  schedule:
    # Nightly 03:30 UTC — catches regressions that slip when GPU capacity is
    # scarce and the PR-time run skips. Staggered off the forge GPU nightly
    # (03:00 UTC); shares the e2e-gpu concurrency group so the two GPU tests
    # never provision droplets concurrently.
    - cron: "30 3 * * *"
  workflow_dispatch:

# Serialize with the forge GPU e2e (same concurrency group) — one GPU droplet at
# a time across both tests; never cancel a running run so its droplet is always
# torn down by the test rather than orphaned. The test skips loudly (exit 0) when
# no GPU capacity is available, so a skipped run never blocks a PR.
concurrency:
  group: e2e-gpu
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  inference-gpu-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: inference gpu e2e
        run: make test-e2e-inference-gpu
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
          # Authenticates the GitHub releases API call that auto-resolves the
          # umbrella chart version (raises the rate limit from 60 to 5000/hour).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
