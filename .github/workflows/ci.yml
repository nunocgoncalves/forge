name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: gofmt
        run: make fmt-check

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: goreleaser check
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: check

      - name: build
        run: make build

      - name: test
        run: make test
