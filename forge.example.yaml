# forge.yaml — substrate recipe, generated by `forge init`.
# The overlay repo (chart values + CRDs) is the runtime source of truth, not this file.
apiVersion: forge.horizonshift.io/v1alpha1
kind: Cluster
metadata:
  name: opo1
spec:
  mode: single-node            # single-node | ha | byokubeconfig (v1: single-node)
  hosts:
    - address: 10.20.0.10
      sshUser: forge           # any sudoer user; preflight validates passwordless sudo
      sshKeyPath: ~/.ssh/forge_ed25519
      role: control-plane+worker
      labels:                  # applied verbatim; GPU-aware logic is HOR-240
        node-role.horizonshift.io/gpu: "true"
      taints: []
  k3s:
    version: v1.31.5+k3s1       # full k3s release tag (vX.Y.Z+k3sN); overridable
    clusterCIDR: 10.42.0.0/16
    serviceCIDR: 10.43.0.0/16
    dualStack: true
    clusterCIDRv6: fd42::/48
    serviceCIDRv6: fd43::/112
    disable: [traefik, servicelb]   # umbrella chart owns ingress (HOR-239)
    extraArgs: []
  flux: { enabled: false }     # forge action; reserved, deferred (HOR-239+)
  overlay:                     # reserved; empty for HOR-238
    repo: ""
    branch: main
    path: ./overlay
  chart:                       # platform umbrella chart (iterabase-platform); empty version => k3s-only
    version: 0.1.0             # chart version to install (semver)
    # repository: oci://ghcr.io/nunocgoncalves/iterabase-charts/iterabase-platform  # default
    # release: opo1            # default: metadata.name
    # namespace: iterabase-system  # default
